jdk:
  - openjdk17

# JitPack's system Gradle is 4.8.1 (2018) which can't parse modern
# Kotlin DSL build scripts or load AGP 8.2.0. Install Gradle 8.4 via
# SDKMan (already available in JitPack's build image).
before_install:
  - yes | sdk install gradle 8.4
  - sdk default gradle 8.4

install:
  - gradle assembleRelease publishToMavenLocal
