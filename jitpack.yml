jdk:
  - openjdk17

# JitPack's build image doesn't have ./gradlew because we don't ship a Gradle
# wrapper (would require committing the wrapper JAR as a binary). Use the
# system `gradle` provided by JitPack's build image instead. Gradle 8.x ships
# by default and supports AGP 8.2.0.
install:
  - gradle assembleRelease publishToMavenLocal
